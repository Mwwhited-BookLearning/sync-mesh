<el-container class="app-shell">
  <el-header class="app-shell__header">
    <h1>SyncMesh Monitor</h1>
    <el-tag :type="store.isConnected ? 'success' : 'danger'">
      {{ store.isConnected ? 'Live' : 'Disconnected' }}
    </el-tag>
  </el-header>

  <el-main>
    <el-tabs type="card">
      <el-tab-pane label="Topology">
        <TopologyView />
      </el-tab-pane>
      <el-tab-pane label="Data">
        <DataView />
      </el-tab-pane>
    </el-tabs>
  </el-main>
</el-container>
