# Shared config for every "plain" node in the deployment-model sandbox —
# standalone servers and mesh peers alike, since server-mesh replication
# is point-to-point at the application layer (MeshForwarder dialing each
# peer's own URL directly), not native NATS gateway clustering. See
# docs/adr/0002-nats-leaf-nodes-for-transport.md's 2026-07-23 (Phase 3)
# Amendment. server_name is overridden per-service via `--name` in
# docker-compose.yml so this one file covers every such node.
port: 4222

jetstream {
    store_dir: "/data"
}
