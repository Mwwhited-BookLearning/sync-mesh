# Daemon-side leaf node for the client-onprem deployment model — dials out
# to nats-hub-onprem (resolved via Docker Compose's default network, where
# service names are hostnames).
port: 4222
server_name: nats-leaf-onprem

jetstream {
    store_dir: "/data"
}

leafnodes {
    remotes: [
        { url: "nats-leaf://nats-hub-onprem:7422" }
    ]
}
