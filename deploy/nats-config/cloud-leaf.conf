# Daemon-side leaf node for the client-cloud deployment model — dials out
# to nats-hub-cloud directly, with no on-prem server in the picture.
port: 4222
server_name: nats-leaf-cloud

jetstream {
    store_dir: "/data"
}

leafnodes {
    remotes: [
        { url: "nats-leaf://nats-hub-cloud:7422" }
    ]
}
