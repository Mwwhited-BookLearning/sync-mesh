# Daemon's embedded local NATS leaf node — dials out to the nearest-server
# hub. Local JetStream stream lives here (WorkQueue retention, disk-bound
# ceiling by default). See docs/adr/0002-nats-leaf-nodes-for-transport.md.
port: 4222
server_name: nats-leaf

jetstream {
    store_dir: "/data"
}

leafnodes {
    remotes: [
        { url: "nats-leaf://nats-hub:7422" }
    ]
}
